<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BetBlock</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup">
    <div class="header">
      <div class="brand">
        <svg class="logo" width="24" height="24" viewBox="0 0 24 24" fill="none">
          <path d="M12 2L3 7v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V7l-9-5z" fill="currentColor" opacity="0.2"/>
          <path d="M12 2L3 7v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V7l-9-5z" stroke="currentColor" stroke-width="1.5" fill="none"/>
          <path d="M9 12l2 2 4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <h1>BetBlock</h1>
      </div>
      <span class="status" id="status-badge">Active</span>
    </div>

    <div class="stats-bar">
      <div class="stat-item">
        <span class="stat-value" id="block-count">0</span>
        <span class="stat-label">blocked</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-item">
        <span class="stat-value" id="domain-count">0</span>
        <span class="stat-label">domains</span>
      </div>
    </div>

    <div class="toggle-section">
      <button class="btn btn-toggle" id="toggle-btn">
        <span class="btn-icon" id="toggle-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2L3 7v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V7l-9-5z"/>
            <line x1="4" y1="4" x2="20" y2="20"/>
          </svg>
        </span>
        <span id="toggle-text">Disable Blocking</span>
      </button>
    </div>

    <!-- Confirmation dialog shown when disabling with safeguard on -->
    <div class="confirm-section hidden" id="confirm-section">
      <div class="confirm-card">
        <p class="confirm-prompt">Type the phrase below to disable:</p>
        <p class="confirm-phrase">I want to disable blocking</p>
        <input
          type="text"
          id="confirm-input"
          placeholder="Type the phrase above..."
          autocomplete="off"
          spellcheck="false"
        >
        <div class="confirm-actions">
          <button class="btn btn-danger" id="confirm-btn" disabled>Confirm</button>
          <button class="btn btn-ghost" id="cancel-btn">Cancel</button>
        </div>
      </div>
    </div>

    <div class="footer">
      <a href="#" id="options-link">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
        Settings
      </a>
    </div>
  </div>
  <script src="popup.js" type="module"></script>
</body>
</html>
